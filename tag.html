<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Articles — MyVolt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="assets/css/fonts.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-nav="">

  <div id="site-header"></div>

  <nav class="breadcrumb">
    <a href="index.html">Accueil</a><span class="sep">›</span>
    <span>Tags</span><span class="sep">›</span>
    <span id="tag-breadcrumb">—</span>
  </nav>

  <section class="page-header">
    <div class="page-header-inner">
      <span class="badge-aud" id="tag-badge" style="background:var(--rexel-blue-tint);color:var(--rexel-blue);">Thématique</span>
      <h1 id="tag-title">Articles</h1>
      <p class="lede" id="tag-lede">Tous les articles sur ce thème.</p>
    </div>
  </section>

  <section class="section">
    <div class="articles-grid" id="tag-articles-grid">
      <!-- Populated by JS -->
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const tag = params.get('tag') || '';
      const label = (typeof TAG_LABELS !== 'undefined' && TAG_LABELS[tag]) ? TAG_LABELS[tag] : tag;

      document.title = label + ' — MyVolt';
      document.getElementById('tag-breadcrumb').textContent = label;
      document.getElementById('tag-title').textContent = label;
      document.getElementById('tag-badge').textContent = label;
      document.getElementById('tag-lede').textContent =
        'Tous les articles MyVolt sur le thème « ' + label + ' ».';

      const grid = document.getElementById('tag-articles-grid');

      if (typeof ARTICLE_META === 'undefined') {
        grid.innerHTML = '<p style="color:var(--gray-500);padding:40px 0;">Chargement impossible.</p>';
        return;
      }

      const articles = ARTICLE_META.filter(a => a.tags.includes(tag));

      if (!articles.length) {
        grid.innerHTML = '<p style="color:var(--gray-500);padding:40px 0;">Aucun article sur ce thème pour le moment.</p>';
        return;
      }

      /* Cartes en <div> (pas <a>) pour éviter l'imbrication <a> dans <a>
         (les tag links seraient des <a> enfants d'un <a> article-card — HTML invalide).
         Le clic sur la carte navigue via JS onclick. */
      grid.innerHTML = articles.map(a => {
        const tagSpans = a.tags.map(t => {
          const tl = (typeof TAG_LABELS !== 'undefined' && TAG_LABELS[t]) ? TAG_LABELS[t] : t;
          const active = t === tag ? ' article-tag--active' : '';
          return '<a href="tag.html?tag=' + encodeURIComponent(t) + '" class="article-tag' + active + '">' + tl + '</a>';
        }).join('');

        const img = a.image
          ? '<div class="article-image"><img src="' + a.image + '" alt="' + a.title + '"></div>'
          : '';

        return '<div class="article-card" onclick="location.href=\'' + a.href + '\'" style="cursor:pointer;">'
          + img
          + '<div class="article-body">'
          + '<span class="badge-aud electriciens">' + a.audience + '</span>'
          + '<p class="article-meta" style="margin-top:8px;">' + a.date + ' · ' + a.readTime + '</p>'
          + '<h3 class="article-title">' + a.title + '</h3>'
          + '<div class="article-tags">' + tagSpans + '</div>'
          + '</div>'
          + '<div class="article-card-footer">'
          + '<span class="article-read-time">' + a.readTime + '</span>'
          + '<span class="article-card-cta">Lire l\'article</span>'
          + '</div>'
          + '</div>';
      }).join('');
    });
  </script>

</body>
</html>
