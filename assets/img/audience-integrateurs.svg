<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgInteg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066B3"/>
      <stop offset="100%" stop-color="#4A90D9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgInteg)"/>

  <!-- Grille -->
  <g opacity="0.08" stroke="#FFFFFF" stroke-width="1" fill="none">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>

  <!-- Armoire industrielle -->
  <g transform="translate(220, 100)">
    <rect x="0" y="0" width="360" height="320" rx="6" fill="#2C3E50"/>
    <rect x="6" y="6" width="348" height="308" rx="4" fill="#34495E"/>

    <!-- Header -->
    <rect x="20" y="20" width="320" height="40" fill="#0066B3"/>
    <text x="180" y="46" font-family="Open Sans, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">ARMOIRE INDUSTRIELLE</text>

    <!-- API / Automate -->
    <g transform="translate(40, 80)">
      <rect x="0" y="0" width="120" height="60" rx="4" fill="#1A1A1A"/>
      <rect x="10" y="10" width="20" height="20" rx="2" fill="#22C55E"/>
      <rect x="35" y="10" width="20" height="20" rx="2" fill="#22C55E"/>
      <rect x="60" y="10" width="20" height="20" rx="2" fill="#FBBF24"/>
      <rect x="85" y="10" width="20" height="20" rx="2" fill="#22C55E"/>
      <text x="60" y="50" font-family="Open Sans, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" text-anchor="middle">API</text>
    </g>

    <!-- Variateurs -->
    <g transform="translate(180, 80)">
      <rect x="0" y="0" width="60" height="60" rx="3" fill="#1A1A1A"/>
      <rect x="10" y="10" width="40" height="20" rx="2" fill="#0066B3"/>
      <text x="30" y="50" font-family="Open Sans, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" text-anchor="middle">VAR</text>
    </g>
    <g transform="translate(250, 80)">
      <rect x="0" y="0" width="60" height="60" rx="3" fill="#1A1A1A"/>
      <rect x="10" y="10" width="40" height="20" rx="2" fill="#0066B3"/>
      <text x="30" y="50" font-family="Open Sans, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" text-anchor="middle">VAR</text>
    </g>

    <!-- Disjoncteurs -->
    <g transform="translate(40, 160)">
      <rect x="0" y="0" width="270" height="50" rx="3" fill="#E5E5E0"/>
      <g fill="#1A1A1A">
        <rect x="10" y="10" width="20" height="30" rx="1"/>
        <rect x="35" y="10" width="20" height="30" rx="1"/>
        <rect x="60" y="10" width="20" height="30" rx="1"/>
        <rect x="85" y="10" width="20" height="30" rx="1"/>
        <rect x="110" y="10" width="20" height="30" rx="1"/>
        <rect x="135" y="10" width="20" height="30" rx="1"/>
        <rect x="160" y="10" width="20" height="30" rx="1"/>
        <rect x="185" y="10" width="20" height="30" rx="1"/>
        <rect x="210" y="10" width="20" height="30" rx="1"/>
        <rect x="235" y="10" width="20" height="30" rx="1"/>
      </g>
    </g>

    <!-- Borniers -->
    <g transform="translate(40, 230)">
      <rect x="0" y="0" width="270" height="50" rx="3" fill="#1A5A9E"/>
      <text x="135" y="30" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">BORNIER</text>
    </g>
  </g>

  <!-- Cables -->
  <g opacity="0.2" stroke="#FFFFFF" stroke-width="2" fill="none">
    <path d="M 100 250 Q 180 260 220 260" />
    <path d="M 580 260 Q 660 250 700 240" />
  </g>
</svg>
