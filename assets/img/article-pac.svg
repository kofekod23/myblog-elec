<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgPac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066B3"/>
      <stop offset="100%" stop-color="#4A90D9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgPac)"/>

  <!-- Sol -->
  <rect x="0" y="420" width="800" height="80" fill="#003D7C" opacity="0.3"/>

  <!-- Maison -->
  <g transform="translate(110, 200)">
    <rect x="0" y="50" width="200" height="170" fill="#FFFFFF" opacity="0.95"/>
    <polygon points="-20,50 100,-20 220,50" fill="#1A1A1A"/>
    <rect x="40" y="100" width="40" height="40" rx="2" fill="#4A90D9"/>
    <rect x="120" y="100" width="40" height="40" rx="2" fill="#4A90D9"/>
    <rect x="80" y="170" width="40" height="50" fill="#003D7C"/>
  </g>

  <!-- PAC unite exterieure -->
  <g transform="translate(380, 280)">
    <!-- Ombre -->
    <rect x="6" y="6" width="220" height="140" rx="6" fill="#000000" opacity="0.15"/>
    <!-- Bloc PAC -->
    <rect x="0" y="0" width="220" height="140" rx="6" fill="#FFFFFF"/>
    <rect x="0" y="0" width="220" height="30" fill="#003D7C"/>
    <text x="110" y="20" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">PAC AIR / EAU R290</text>

    <!-- Ventilateur -->
    <g transform="translate(110, 90)">
      <circle r="42" fill="none" stroke="#003D7C" stroke-width="2"/>
      <circle r="36" fill="#F5F0E8"/>
      <!-- Pales -->
      <g fill="#003D7C">
        <ellipse cx="0" cy="-22" rx="6" ry="14"/>
        <ellipse cx="19" cy="11" rx="6" ry="14" transform="rotate(60 19 11)"/>
        <ellipse cx="-19" cy="11" rx="6" ry="14" transform="rotate(-60 -19 11)"/>
      </g>
      <circle r="6" fill="#1A1A1A"/>
    </g>

    <!-- Etiquette eco -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="50" height="60" rx="3" fill="#22C55E"/>
      <text x="25" y="22" font-family="Open Sans, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">A+++</text>
      <text x="25" y="42" font-family="Open Sans, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" text-anchor="middle">COP 4.5</text>
    </g>

    <!-- Etiquette R290 -->
    <g transform="translate(180, 60)">
      <circle cx="15" cy="15" r="15" fill="#003D7C"/>
      <text x="15" y="20" font-family="Open Sans, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">R290</text>
    </g>
  </g>

  <!-- Tubes / connexions -->
  <g stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round">
    <path d="M 310 370 Q 350 360 380 360"/>
  </g>

  <!-- Air froid (flocons stylises) -->
  <g fill="#FFFFFF" opacity="0.5">
    <circle cx="640" cy="200" r="3"/>
    <circle cx="680" cy="160" r="3"/>
    <circle cx="660" cy="240" r="3"/>
    <circle cx="700" cy="280" r="3"/>
    <circle cx="680" cy="320" r="3"/>
  </g>

  <!-- Air chaud (vagues stylisees) -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round">
    <path d="M 220 130 Q 230 125 240 130 Q 250 135 260 130"/>
    <path d="M 220 150 Q 230 145 240 150 Q 250 155 260 150"/>
  </g>
</svg>
