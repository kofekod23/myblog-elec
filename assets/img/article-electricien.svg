<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" fill="none">
  <rect width="120" height="80" rx="6" fill="#EBF0F8"/>
  <!-- Tableau électrique -->
  <rect x="30" y="14" width="60" height="44" rx="3" fill="#002855" opacity="0.12" stroke="#002855" stroke-width="1.5"/>
  <!-- Disjoncteurs -->
  <rect x="38" y="22" width="10" height="6" rx="1" fill="#003D7C" opacity="0.7"/>
  <rect x="52" y="22" width="10" height="6" rx="1" fill="#003D7C" opacity="0.7"/>
  <rect x="66" y="22" width="10" height="6" rx="1" fill="#003D7C" opacity="0.7"/>
  <rect x="38" y="32" width="10" height="6" rx="1" fill="#F5A623" opacity="0.8"/>
  <rect x="52" y="32" width="10" height="6" rx="1" fill="#003D7C" opacity="0.7"/>
  <rect x="66" y="32" width="10" height="6" rx="1" fill="#003D7C" opacity="0.7"/>
  <!-- Câble d'entrée -->
  <line x1="60" y1="14" x2="60" y2="8" stroke="#002855" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="55" y1="14" x2="55" y2="8" stroke="#002855" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="65" y1="14" x2="65" y2="8" stroke="#002855" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Barre de distribution -->
  <line x1="38" y1="44" x2="76" y2="44" stroke="#002855" stroke-width="1.5" stroke-linecap="round"/>
  <text x="60" y="72" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#002855" font-weight="600">Électricien</text>
</svg>
