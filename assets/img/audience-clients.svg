<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgClients" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#7BB3E5"/>
    </linearGradient>
    <linearGradient id="windowGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgClients)"/>

  <!-- Soleil -->
  <circle cx="120" cy="120" r="40" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="120" cy="120" r="28" fill="#FFFFFF" opacity="0.7"/>

  <!-- Sol -->
  <rect x="0" y="420" width="800" height="80" fill="#003D7C" opacity="0.3"/>

  <!-- Batiment principal (tertiaire) -->
  <g transform="translate(280, 160)">
    <!-- Corps batiment -->
    <rect x="0" y="0" width="240" height="260" fill="#FFFFFF" opacity="0.95"/>
    <rect x="0" y="0" width="240" height="260" fill="none" stroke="#003D7C" stroke-width="1" opacity="0.3"/>

    <!-- Toiture avec panneaux PV -->
    <rect x="-10" y="-30" width="260" height="32" fill="#1A1A1A"/>
    <g transform="translate(0, -28)">
      <rect x="10" y="0" width="50" height="28" fill="#003D7C"/>
      <rect x="65" y="0" width="50" height="28" fill="#003D7C"/>
      <rect x="120" y="0" width="50" height="28" fill="#003D7C"/>
      <rect x="175" y="0" width="50" height="28" fill="#003D7C"/>
      <!-- Lignes panneaux -->
      <g stroke="#1A5A9E" stroke-width="0.5" opacity="0.7">
        <line x1="35" y1="0" x2="35" y2="28"/>
        <line x1="90" y1="0" x2="90" y2="28"/>
        <line x1="145" y1="0" x2="145" y2="28"/>
        <line x1="200" y1="0" x2="200" y2="28"/>
        <line x1="10" y1="14" x2="225" y2="14"/>
      </g>
    </g>

    <!-- Fenetres : grille -->
    <g fill="url(#windowGlow)">
      <rect x="20" y="20" width="40" height="50" rx="2"/>
      <rect x="70" y="20" width="40" height="50" rx="2"/>
      <rect x="120" y="20" width="40" height="50" rx="2"/>
      <rect x="170" y="20" width="40" height="50" rx="2"/>

      <rect x="20" y="85" width="40" height="50" rx="2"/>
      <rect x="70" y="85" width="40" height="50" rx="2"/>
      <rect x="120" y="85" width="40" height="50" rx="2"/>
      <rect x="170" y="85" width="40" height="50" rx="2"/>

      <rect x="20" y="150" width="40" height="50" rx="2"/>
      <rect x="70" y="150" width="40" height="50" rx="2"/>
      <rect x="120" y="150" width="40" height="50" rx="2"/>
      <rect x="170" y="150" width="40" height="50" rx="2"/>
    </g>

    <!-- Entree -->
    <rect x="100" y="220" width="40" height="40" fill="#003D7C"/>
    <rect x="105" y="225" width="30" height="30" fill="url(#windowGlow)"/>
  </g>

  <!-- Borne IRVE a cote -->
  <g transform="translate(580, 290)">
    <rect x="0" y="0" width="40" height="130" rx="4" fill="#1A1A1A"/>
    <rect x="6" y="10" width="28" height="40" rx="3" fill="#0066B3"/>
    <circle cx="20" cy="30" r="6" fill="#22C55E"/>
    <text x="20" y="80" font-family="Open Sans, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">EV</text>
    <rect x="10" y="100" width="20" height="20" rx="2" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <!-- Petite voiture stylisee -->
  <g transform="translate(620, 380)">
    <rect x="0" y="0" width="80" height="30" rx="6" fill="#FFFFFF" opacity="0.9"/>
    <rect x="15" y="-10" width="50" height="15" rx="4" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="20" cy="32" r="6" fill="#1A1A1A"/>
    <circle cx="60" cy="32" r="6" fill="#1A1A1A"/>
  </g>

  <!-- Petit batiment a gauche -->
  <g transform="translate(120, 280)">
    <rect x="0" y="0" width="120" height="140" fill="#FFFFFF" opacity="0.85"/>
    <rect x="-5" y="-15" width="130" height="18" fill="#1A1A1A"/>
    <g fill="url(#windowGlow)">
      <rect x="15" y="20" width="30" height="40" rx="2"/>
      <rect x="55" y="20" width="30" height="40" rx="2"/>
      <rect x="15" y="70" width="30" height="40" rx="2"/>
      <rect x="55" y="70" width="30" height="40" rx="2"/>
    </g>
  </g>
</svg>
