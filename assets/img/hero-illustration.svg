<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
  <!-- Fond creme -->
  <rect width="1200" height="400" fill="#F5F0E8"/>

  <!-- Lignes electriques abstraites en arriere-plan -->
  <g stroke="#003D7C" stroke-width="1.5" fill="none" opacity="0.15">
    <path d="M 0 80 Q 200 60 400 80 T 800 80 T 1200 60"/>
    <path d="M 0 130 Q 200 110 400 130 T 800 140 T 1200 120"/>
    <path d="M 0 280 Q 200 260 400 280 T 800 270 T 1200 290"/>
    <path d="M 0 330 Q 200 310 400 320 T 800 330 T 1200 310"/>
  </g>

  <!-- Composants electriques disperses -->

  <!-- Tableau electrique a gauche -->
  <g transform="translate(80, 130)" opacity="0.85">
    <rect x="0" y="0" width="160" height="180" rx="6" fill="#FFFFFF" stroke="#003D7C" stroke-width="1.5"/>
    <rect x="0" y="0" width="160" height="28" rx="6" fill="#003D7C"/>
    <rect x="0" y="22" width="160" height="6" fill="#003D7C"/>
    <g transform="translate(15, 45)" fill="#E5E5E0">
      <rect x="0" y="0" width="20" height="35" rx="2"/>
      <rect x="25" y="0" width="20" height="35" rx="2"/>
      <rect x="50" y="0" width="20" height="35" rx="2"/>
      <rect x="75" y="0" width="20" height="35" rx="2"/>
      <rect x="100" y="0" width="20" height="35" rx="2"/>
      <rect x="125" y="0" width="20" height="35" rx="2"/>
    </g>
    <g transform="translate(15, 95)" fill="#E5E5E0">
      <rect x="0" y="0" width="20" height="35" rx="2"/>
      <rect x="25" y="0" width="20" height="35" rx="2"/>
      <rect x="50" y="0" width="20" height="35" rx="2"/>
      <rect x="75" y="0" width="20" height="35" rx="2"/>
      <rect x="100" y="0" width="20" height="35" rx="2"/>
      <rect x="125" y="0" width="20" height="35" rx="2"/>
    </g>
    <rect x="15" y="145" width="130" height="20" rx="2" fill="#0066B3"/>
  </g>

  <!-- Borne IRVE au centre droit -->
  <g transform="translate(640, 100)" opacity="0.85">
    <rect x="0" y="0" width="60" height="200" rx="6" fill="#1A1A1A"/>
    <rect x="10" y="15" width="40" height="50" rx="3" fill="#0066B3"/>
    <circle cx="30" cy="30" r="3" fill="#22C55E"/>
    <rect x="15" y="80" width="30" height="30" rx="3" fill="#003D7C"/>
    <circle cx="30" cy="95" r="9" fill="#1A1A1A"/>
    <rect x="20" y="170" width="20" height="14" rx="2" fill="#FFFFFF"/>
    <text x="30" y="181" font-family="Open Sans, sans-serif" font-size="7" font-weight="700" fill="#003D7C" text-anchor="middle">IRVE</text>
  </g>

  <!-- Panneau PV en haut -->
  <g transform="translate(950, 80)" opacity="0.85">
    <rect x="0" y="0" width="160" height="100" rx="3" fill="#003D7C" transform="skewX(-15)"/>
    <g stroke="#1A5A9E" stroke-width="0.8" opacity="0.7" transform="skewX(-15)">
      <line x1="40" y1="0" x2="40" y2="100"/>
      <line x1="80" y1="0" x2="80" y2="100"/>
      <line x1="120" y1="0" x2="120" y2="100"/>
      <line x1="0" y1="50" x2="160" y2="50"/>
    </g>
  </g>

  <!-- PAC en bas droite -->
  <g transform="translate(900, 240)" opacity="0.85">
    <rect x="0" y="0" width="120" height="80" rx="6" fill="#FFFFFF" stroke="#003D7C" stroke-width="1.5"/>
    <rect x="0" y="0" width="120" height="18" rx="6" fill="#003D7C"/>
    <rect x="0" y="13" width="120" height="5" fill="#003D7C"/>
    <circle cx="60" cy="50" r="22" fill="none" stroke="#003D7C" stroke-width="1.5"/>
    <g fill="#003D7C">
      <ellipse cx="60" cy="38" rx="3" ry="8"/>
      <ellipse cx="71" cy="56" rx="3" ry="8" transform="rotate(60 71 56)"/>
      <ellipse cx="49" cy="56" rx="3" ry="8" transform="rotate(-60 49 56)"/>
    </g>
    <circle cx="60" cy="50" r="3" fill="#1A1A1A"/>
  </g>

  <!-- Ampoule LED a gauche en bas -->
  <g transform="translate(310, 270)" opacity="0.85">
    <circle cx="20" cy="20" r="22" fill="#003D7C"/>
    <circle cx="20" cy="20" r="16" fill="#FBBF24" opacity="0.6"/>
    <rect x="13" y="40" width="14" height="10" rx="2" fill="#1A1A1A"/>
    <rect x="11" y="48" width="18" height="5" rx="2" fill="#1A1A1A"/>
    <!-- Rayonnement -->
    <g stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
      <line x1="20" y1="-12" x2="20" y2="-4"/>
      <line x1="42" y1="20" x2="50" y2="20"/>
      <line x1="-2" y1="20" x2="-10" y2="20"/>
      <line x1="38" y1="2" x2="44" y2="-4"/>
      <line x1="2" y1="2" x2="-4" y2="-4"/>
    </g>
  </g>

  <!-- Eclair central decoration -->
  <g transform="translate(450, 165)" opacity="0.5">
    <path d="M 0 0 L 30 0 L 15 35 L 38 35 L 8 90 L 22 45 L 0 45 Z" fill="#003D7C"/>
  </g>
</svg>
